<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 - 锋锋の小站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
       
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">锋锋の小站</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">主页</a>
                <a href="about.html" class="nav-link active">关于</a>
                <a href="blog.html" class="nav-link">动态</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1 class="name">关于</h1>
            <p class="tagline">了解更多关于我的信息</p>
        </header>

        <section>
            <div class="section-header">
                <div class="section-icon">
                    <i class="fas fa-heart"></i>
                </div>
                <h2 class="section-title">个人简介</h2>
                <div class="section-line"></div>
            </div>
            <div class="card">
                <div class="about-text" id="aboutText">
                </div>
            </div>
        </section>

        <section>
            <div class="section-header">
                <div class="section-icon">
                    <i class="fas fa-star"></i>
                </div>
                <h2 class="section-title">兴趣爱好</h2>
                <div class="section-line"></div>
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-film"></i>
                    </div>
                    <h3 class="info-title">动漫</h3>
                    <p class="info-desc" id="animeDesc">热爱观看各种类型的动漫，从热血少年到治愈日常，每一部都是心灵的慰藉。</p>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-gamepad"></i>
                    </div>
                    <h3 class="info-title">游戏</h3>
                    <p class="info-desc" id="gameDesc">享受游戏带来的乐趣，无论是独立游戏还是大作，都能找到属于自己的快乐。</p>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-code"></i>
                    </div>
                    <h3 class="info-title">编程</h3>
                    <p class="info-desc" id="codingDesc">用代码创造有趣的项目，享受解决问题的过程，不断学习新技术。</p>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-music"></i>
                    </div>
                    <h3 class="info-title">音乐</h3>
                    <p class="info-desc" id="musicDesc">喜欢听各种风格的音乐，音乐是生活中不可或缺的调味剂。</p>
                </div>
            </div>
        </section>

        <section>
            <div class="section-header">
                <div class="section-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <h2 class="section-title">联系方式</h2>
                <div class="section-line"></div>
            </div>
            <div class="card">
                <div class="about-text" id="contactText">
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 锋锋の小站. All rights reserved.</p>
        </footer>
        <button class="back-to-top" id="backToTop">
            <i class="fas fa-arrow-up"></i>
        </button>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
